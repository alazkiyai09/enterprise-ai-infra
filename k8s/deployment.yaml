apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-ai-infra-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-ai-infra-api
  template:
    metadata:
      labels:
        app: enterprise-ai-infra-api
    spec:
      containers:
      - name: api
        image: enterprise-ai-infra:latest
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: production
